<div class="overflow-x-auto">
    <table class="w-full text-left">
        <tbody class="divide-y divide-gray-50">
            @for (row of [].constructor(rows); track $index) {
            <tr class="animate-pulse">
                @for (col of [].constructor(cols); track $index) {
                    <td class="px-6 py-5">
                        <div class="h-4 w-20 bg-gray-50 rounded"></div>           </td>
                }
            </tr>
            }
        </tbody>
    </table>
</div>
@for (row of [].constructor(rows); track $index) {
<tr class="animate-pulse">
    <td class="px-8 py-5">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-2xl bg-gray-100"></div>
            <div class="h-4 w-32 bg-gray-100 rounded-md"></div>
        </div>
    </td>
    <td class="px-6 py-5">
        <div class="h-4 w-20 bg-gray-50 rounded"></div>
    </td>
    <td class="px-6 py-5">
        <div class="h-4 w-16 bg-gray-50 rounded"></div>
    </td>
    <td class="px-8 py-5 text-right">
        <div class="h-4 w-12 bg-gray-100 rounded ml-auto"></div>
    </td>
</tr>
}
