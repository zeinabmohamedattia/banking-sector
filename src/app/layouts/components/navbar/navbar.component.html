<nav
    class="sticky top-0 z-50   backdrop-blur-xl bg-indigo-200/70 border border-white/40 shadow-[0_8px_30px_rgb(0,0,0,0.05)] rounded-3xl px-4 sm:px-6 transition-all">

    <div class="max-w-7xl mx-auto">

        <div class="flex items-center justify-between h-18 py-2">

            <div routerLink="/dashboard" class="flex items-center gap-3 group cursor-pointer">

                <div
                
                    class="w-11 h-11 rounded-2xl bg-gradient-to-br from-indigo-600 to-violet-500 flex items-center justify-center shadow-lg shadow-indigo-500/30 group-hover:scale-105 transition">

                    <i class="pi pi-building-columns text-white text-xl"></i>
                </div>

                <div class="leading-tight">
                    <h1
                        class="text-lg sm:text-xl font-black bg-gradient-to-r from-indigo-600 to-violet-500 bg-clip-text text-transparent tracking-tight">
                        Bank Portal
                    </h1>

                    <p class="text-[11px] text-gray-400 font-medium">
                        Smart Banking Dashboard
                    </p>
                </div>
            </div>

            @if(isLoggedIn()){

            <!-- Desktop Nav -->
            <div class="hidden md:flex items-center gap-2">

                <a routerLink="/dashboard" routerLinkActive="bg-indigo-600 text-white shadow-lg shadow-indigo-500/20"
                    [routerLinkActiveOptions]="{ exact: true }"
                    class="px-5 py-2.5 rounded-2xl text-sm font-semibold text-gray-600 hover:bg-gray-400 transition-all duration-200">

                    <i class="pi pi-chart-bar mr-2"></i>
                    Dashboard
                </a>

            </div>
            <div class="hidden md:flex items-center gap-4">

                <div class="flex items-center gap-3 bg-gray-100/80 border border-gray-200 px-3 py-2 rounded-2xl">

                    <div
                        class="w-9 h-9 uppercase rounded-xl bg-gradient-to-br from-indigo-500 to-violet-500 text-white flex items-center justify-center font-bold text-xl shadow">
                        {{admin()?.email.charAt(0)}}
                    </div>

                    <div class="leading-tight">
                        <p class="text-xs text-gray-400 font-medium">
                            Welcome back
                        </p>

                        <h3 class="text-sm font-bold text-gray-800">
                            Admin
                        </h3>
                    </div>
                </div>

                <!-- Logout -->
                <button (click)="signOut()"
                    class="w-11 h-11 cursor-pointer rounded-2xl bg-red-50 hover:bg-red-500 group transition-all duration-200 flex items-center justify-center border border-red-100">

                    <i class="pi pi-sign-out text-red-500 group-hover:text-white transition"></i>
                </button>

            </div>
            }

            <!-- Mobile Toggle -->
            <button (click)="toggleMenu()"
                class="md:hidden w-11 h-11 rounded-2xl bg-gray-100 hover:bg-gray-200 text-gray-700 transition flex items-center justify-center">

                <i class="pi text-lg" [class.pi-bars]="!isMenuOpen()" [class.pi-times]="isMenuOpen()"></i>

            </button>

        </div>

        <!-- Mobile Menu -->
        @if (isMenuOpen()) {
        @if(isLoggedIn()){

        <div class="md:hidden pb-4 pt-2 mt-2 border-t border-gray-100 animate-fadeIn">

            <!-- Mobile User -->
            <div class="flex items-center gap-3 px-2 py-4 mb-3 rounded-2xl bg-gray-50 border border-gray-100">

                <div
                    class="w-11 h-11 rounded-xl bg-gradient-to-br from-indigo-500 to-violet-500 text-white flex items-center justify-center font-bold shadow">

                    {{admin()?.email.charAt(0)}}

                </div>

                <div>
                    <p class="text-xs text-gray-400">
                        Welcome back
                    </p>

                    <h3 class="text-sm font-bold text-gray-800">
                        User
                    </h3>
                </div>
            </div>

            <!-- Mobile Links -->
            <div class="space-y-2">

                <a routerLink="/dashboard" routerLinkActive="bg-indigo-600 text-white"
                    [routerLinkActiveOptions]="{ exact: true }"
                    class="flex items-center gap-3 px-4 py-3 rounded-2xl text-gray-700 hover:bg-gray-100 transition font-medium">

                    <i class="pi pi-chart-bar"></i>

                    Dashboard
                </a>

            </div>

            <!-- Logout -->
            <button (click)="signOut()"
                class="w-full mt-4 px-4 py-3 rounded-2xl bg-red-50 hover:bg-red-500 border border-red-100 text-red-500 hover:text-white transition-all flex items-center justify-center gap-2 font-semibold">

                <i class="pi pi-sign-out"></i>

                Logout
            </button>

        </div>

        }
        }

    </div>
</nav>
