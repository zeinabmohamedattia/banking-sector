
    <div class="grid grid-cols-1 md:grid-cols-2  lg:grid-cols-3 gap-8">
    
        @for (account of customerAccounts(); track account.id) {
    
        <div
            class="group bg-white rounded-[2.5rem] shadow-sm border border-gray-100 p-6 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 relative overflow-hidden">
    
            <div
                class="absolute -right-10 -top-10 w-32 h-32 bg-indigo-50 rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-500">
            </div>
    
            <!-- الجزء العلوي (Header) -->
            <div class="flex items-start justify-between mb-8 relative z-10">
                <div class="flex items-center gap-4">
                    <div
                        class="w-12 h-12 rounded-2xl bg-indigo-600 text-white flex items-center justify-center shadow-lg shadow-indigo-200 group-hover:scale-110 transition-transform">
                        <i [class]="account.type === 'Savings' ? 'pi pi-percentage' : 'pi pi-wallet'" class="text-lg"></i>
                    </div>
    
                    <div>
                        <h3 class="font-black text-gray-900 tracking-tight uppercase text-xs">
                            {{ account.type }} Account
                        </h3>
                        <div class="flex items-center gap-1.5 mt-0.5">
                            <i class="pi pi-globe text-[10px] text-gray-400"></i>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                                {{ account.currency }}
                            </p>
                        </div>
                    </div>
                </div>
    
                <!-- Status Badge -->
                <span class="px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-tighter" [class]="account.status === 'Active'
                            ? 'bg-emerald-100 text-emerald-700'
                            : 'bg-rose-100 text-rose-600'">
                    {{ account.status }}
                </span>
            </div>
    
            <!-- الرصيد (Balance Section) -->
            <div class="mb-8 relative z-10">
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mb-1">Available Balance</p>
                <div class="flex items-baseline gap-2">
                    <h2 class="text-3xl font-black text-gray-900 tracking-tighter">
                        {{ account.balance | number:'1.2-2' }}
                    </h2>
                    <span class="text-sm font-bold text-indigo-600 uppercase">{{ account.currency }}</span>
                </div>
            </div>
    
            <!-- رقم الـ IBAN (Styled as a Card Chip) -->
            <div class="bg-gray-50 rounded-2xl p-4 mb-6 group-hover:bg-indigo-50/50 transition-colors relative z-10">
                <div class="flex justify-between items-center mb-1.5">
                    <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest">International Bank Account
                        Number</p>
                    <i
                        class="pi pi-copy text-gray-300 text-[10px] cursor-pointer hover:text-indigo-600 transition-colors"></i>
                </div>
                <p class="text-sm font-mono font-bold text-gray-700 tracking-wider">
                    {{ account.iban }}
                </p>
            </div>
    
            <!-- الزر (View Transactions) -->
            <a [routerLink]="['/transactions', account.id]"
                class="w-full flex items-center justify-center gap-3 bg-gray-900 hover:bg-indigo-600 text-white py-4 rounded-2xl font-bold text-sm shadow-lg shadow-gray-200 hover:shadow-indigo-200 transition-all active:scale-95 relative z-10">
                <i class="pi pi-arrow-right text-xs"></i>
                View Transactions
            </a>
    
        </div>
    
        }
    
        </div>
